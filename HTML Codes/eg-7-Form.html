<html>

<head>
    <title> My Form</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Scholarship Form</legend>
            <!--My Personal Information-->
            <label>Enter Your Name :</label>
            <input type="text" placeholder="Enter your name"><br><br>
            <label>Enter Your Class :</label>
            <input type="text" placeholder="Class Name"><br><br>
            <label>Enter Your Collage Name :</label>
            <input type="text" placeholder="Collage Name"><br><br>
            <label>Enter Your Age :</label>
            <input type="number" placeholder="Age"><br><br>
            <label>Enter Your D.O.B :</label>
            <input type="number" placeholder="D.O.B"><br><br>
            <label>Enter Your Email :</label>
            <input type="email" placeholder="Email"><br><br>
            <label>Enter Your Mobile No :</label>
            <input type="number" placeholder="Mobile Number"><br><br>

            <label>Gender :</label>
            <input type="radio" name="gender" value="male">Male

            <input type="radio" name="gender">
            <label>Female</label><br><br>

            <label>Select Courses :</label><br><br>
            <input type="checkbox">C<br>
            <input type="checkbox">C++<br>
            <input type="checkbox">JavaScript<br>
            <input type="checkbox">Java<br>
            <input type="checkbox"><label>Python</label><br>
            <input type="checkbox"><label>HTML</label><br><br>

            <label>Select Collages :</label>
            <select>
                <option>S.B.Jain</option>
                <option>YCCE</option>
                <option>IIT</option>
                <option>JD</option>
            </select><br><br>

            <input type="button" name="Submit" value="Submit">
            <input type="button" name="Reset" value="Reset">
            <button>Back</button>
            
        </fieldset>
    </form>
</body>

</html>
