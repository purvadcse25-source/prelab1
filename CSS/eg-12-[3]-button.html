<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: bisque;
      min-height: 100vh;
      padding-top: 30px;
    }
  .btn-custom {
      padding: 14px 28px;
      font-size: 17px;
      font-weight: 500;
      margin: 8px;
      border-radius: 6px;
      transition: 0.3s;
      width: 100%; /* Full width in column */
    }
  .btn-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .two{
      align-items: center;
       display: flex;
      flex-direction: row;
      justify-content: center;
      font-size: 40px;
    }
  </style>
</head>
<body>
<div class="two">Buttons Page</div>
  <div class="container text-center">
    
    <!-- PEHLI ROW - 4 BUTTON -->
    <div class="row mb-3">
      <div class="col-6 col-md-3">
        <a href="./eg-11.html" class="btn btn-primary btn-custom">Back to Home Page</a>
      </div>
      <div class="col-6 col-md-3">
        <a href="./eg-11-[1]-carousel.html" class="btn btn-success btn-custom">Back to Carousel Page</a>
      </div>
      <div class="col-6 col-md-3">
        <a href="./eg-11-[2]-cards.html" class="btn btn-danger btn-custom">Back to Cards Page</a>
      </div>
      <div class="col-6 col-md-3">
        <a href="./eg-11-[3]-button.html" class="btn btn-warning btn-custom">Back to Buttons Page</a>
      </div>
    </div>

    <!-- DUSRI ROW - 2 BUTTON -->
    <div class="row justify-content-center">
      <div class="col-6 col-md-3">
        <a href="./eg-11-[4]-GridSystem.html" class="btn btn-info btn-custom">Back to GridSystem Page</a>
      </div>
      <div class="col-6 col-md-3">
        <a href="./eg-11-[5]-Footer.html" class="btn btn-dark btn-custom">Back to Footer Page</a>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
