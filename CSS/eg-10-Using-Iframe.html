<html>

<head>
    <title>Easy Iframe Demo</title>
</head>

<body>
    <h2>Iframe Content Switcher</h2>
    <!-- Three Anchor Tags pointing to the iframe named 'myFrame' -->
    <p>
        <a href="https://wikipedia.org" target="myFrame">Load Wikipedia</a> |
        <a href="https://www.zomato.com/" target="myFrame">Load Zomato</a> |
        <a href="https://www.sbjit.edu.in/" target="myFrame">Load S.B.Jain</a>
    </p>
    <!-- Single Iframe to display the content -->
    <iframe name="myFrame" src="https://wikipedia.org" width="100%" height="500">
    </iframe>
</body>

</html>
