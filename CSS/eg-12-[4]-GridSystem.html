<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Without Cards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .grid-box{
      padding: 45px 30px;
      height: 100%;
    }
    .grid-box h3{
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .grid-box p{
      font-size: 16px;
      margin-bottom: 0;
    }
    /* Grid system yaha use ho raha hai 👇 */
    .bg-blue{
      background-color: #cfe2ff;
      color: #084298;
    }
    .bg-red{
      background-color: #f8d7da;
      color: #842029;
    }
    .bg-green{
      background-color: #d1e7dd;
      color: #0f5132;
    }
    .two{
      align-items: center;
       display: flex;
      flex-direction: row;
      justify-content: center;
      font-size: 40px;
    }
  </style>
</head>
<body>
  <div class="two">Grid System Page</div>
  <div class="container py-5">
    
    
    <!-- Yaha se Grid System start hai 👇 -->
    <div class="row g-0">
      <div class="col-md-4">
        <div class="grid-box bg-blue">
          <h3>Fast Delivery</h3>
          <p>Hum sabse tez kaam karte hain. Deadline se pehle deliver karte hain hamesha.</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="grid-box bg-red">
          <h3>Safe & Secure</h3>
          <p>Tumhara data 100% protected hai. Latest security protocols use karte hain.</p>
        </div>
      </div>

      <div class="col-md-4">
        <div class="grid-box bg-green">
          <h3>Full Support</h3>
          <p>Koi bhi problem ho, hamari team hamesha help ke liye ready hai 24/7.</p>
        </div>
      </div>
    </div>
    <!-- Grid System yaha khatam 👆 -->
    
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
