<html>
<head>
  <meta charset="UTF-8">
  <title>Carousel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .carousel-item img{
      height: 500px;
      object-fit: contain;
      background: #e9e9e9;
    }
    .carousel{
      width: 80%;
      margin: 30px auto;
    }
    .two{
      align-items: center;
       display: flex;
      flex-direction: row;
      justify-content: center;
      font-size: 40px;
    }
  </style>
</head>
<body>
<div class="two">Carousel Page</div>
  <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://png.pngtree.com/thumb_back/fh260/background/20230610/pngtree-cute-cuteness-wallpaper-image_2935345.jpg" class="d-block w-100" alt="Dog">
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/id/238/800/500" class="d-block w-100" alt="City">
      </div>
      <div class="carousel-item">
        <img src="https://picsum.photos/id/239/800/500" class="d-block w-100" alt="Flower">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
